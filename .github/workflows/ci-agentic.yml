name: Production E2E Agentic Quality Pipeline v2.1

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agentic-quality-pipeline:
    name: Agentic Quality & E2E Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Node & Python Dependencies
        run: |
          npm ci
          if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi
          if [ -f server/requirements-dev.txt ]; then pip install -r server/requirements-dev.txt; fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Static Type & Compilation Gate
        run: npx tsc --noEmit

      - name: Frontend Vitest Suite
        run: npm test -- --run

      - name: Backend Pytest Suite
        run: cd server && pytest

      - name: Playwright E2E & Accessibility Audit
        run: npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:5173

      - name: Prepare Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Multi-Stage Docker Build Verification
        run: docker compose build
        env:
          POSTGRES_USER: meridian_user
          POSTGRES_PASSWORD: meridian_secure_pass
          POSTGRES_DB: meridian_dev
          JWT_SECRET: supersecretlocaltokenkey123!
