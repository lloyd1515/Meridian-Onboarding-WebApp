name: Meridian Onboarding WebApp CI/CD Quality Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend Vitest & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Static Type Check
        run: npx tsc --noEmit

      - name: Run Frontend Vitest Test Suite
        run: npm test -- --run

      - name: Build Production Bundle
        run: npm run build

  backend-quality:
    name: Backend Pytest Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi
          if [ -f server/requirements-dev.txt ]; then pip install -r server/requirements-dev.txt; fi

      - name: Run Pytest Test Suite
        run: |
          cd server && pytest

  security-scan:
    name: Secret & Vulnerability Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Secret Leak Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  docker-build:
    name: Docker Multi-Stage Container Verification
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality, security-scan]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Compose Stack
        run: docker compose build
        env:
          POSTGRES_USER: meridian_user
          POSTGRES_PASSWORD: meridian_secure_pass
          POSTGRES_DB: meridian_dev
          JWT_SECRET: supersecretlocaltokenkey123!
